<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Água Marques Caminhão Pipa - Bangu | RJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #08090C;
            --blue-primary: #1A6FD4;
            --blue-light: #4D9FFF;
            --text-light: #F2F4F8;
            --font-barlow-condensed: 'Barlow Condensed', sans-serif;
            --font-barlow: 'Barlow', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-barlow);
            line-height: 1.6;
            color: var(--text-light);
            background-color: var(--bg-dark);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            text-decoration: none;
            color: var(--blue-light);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-barlow-condensed);
            color: var(--text-light);
            margin-bottom: 0.5em;
            font-weight: 700;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .btn {
            display: inline-block;
            background-color: var(--blue-primary);
            color: var(--text-light);
            padding: 0.8em 1.8em;
            border-radius: 5px;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            font-family: var(--font-barlow);
        }

        .btn:hover {
            background-color: var(--blue-light);
            transform: translateY(-2px);
        }

        section {
            padding: 4rem 0;
            text-align: center;
        }

        /* Navbar */
        .navbar {
            background-color: var(--bg-dark);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            color: var(--text-light);
            font-family: var(--font-barlow-condensed);
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .navbar-brand span {
            color: var(--blue-primary);
        }

        .navbar-contact a {
            color: var(--text-light);
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }

        .navbar-contact a:hover {
            color: var(--blue-light);
            background-color: rgba(26, 111, 212, 0.1);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(8, 9, 12, 0.7), rgba(8, 9, 12, 0.7)), url('https://via.placeholder.com/1920x800/08090C/F2F4F8?text=Caminhao+Pipa+de+Qualidade') no-repeat center center/cover;
            padding: 8rem 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            color: var(--text-light);
        }

        .hero .btn {
            font-size: 1.2rem;
            padding: 1em 2.5em;
        }

        /* Pain Points Section */
        .pain-points {
            background-color: var(--bg-dark);
            padding: 4rem 0;
        }

        .pain-points h2 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: var(--blue-primary);
            text-transform: uppercase;
        }

        .pain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .pain-item {
            background-color: #1a1c20;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
</body>
</html>
